  publish-release:
    name: Publish GitHub Release (Attach Artifacts)
    runs-on: ubuntu-latest
    needs: [version, build-lint-test, musl-build, windows-gnu-cross]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Artifact (Linux GNU)
        uses: actions/download-artifact@v4
        with:
          name: ned-linux-gnu-${{ needs.version.outputs.version }}
          path: dist/linux-gnu

      - name: Download Artifact (Linux musl)
        uses: actions/download-artifact@v4
        with:
          name: ned-linux-musl-${{ needs.version.outputs.version }}
          path: dist/linux-musl

      - name: Download Artifact (macOS)
        uses: actions/download-artifact@v4
        with:
          name: ned-macos-${{ needs.version.outputs.version }}
          path: dist/macos

      - name: Download Artifact (Windows MSVC)
        uses: actions/download-artifact@v4
        with:
          name: ned-windows-${{ needs.version.outputs.version }}
          path: dist/windows

      - name: Download Artifact (Windows GNU)
        uses: actions/download-artifact@v4
        with:
          name: ned-windows-gnu-${{ needs.version.outputs.version }}.exe
          path: dist/windows-gnu

      - name: Prepare Asset Names
        run: |
          mkdir -p dist
          mv dist/linux-gnu/ned dist/ned-linux-gnu-${{ needs.version.outputs.version }}
          mv dist/linux-musl/ned dist/ned-linux-musl-${{ needs.version.outputs.version }}
          mv dist/macos/ned dist/ned-macos-${{ needs.version.outputs.version }}
          mv dist/windows/ned.exe dist/ned-windows-${{ needs.version.outputs.version }}.exe
          mv dist/windows-gnu/ned.exe dist/ned-windows-gnu-${{ needs.version.outputs.version }}.exe

      - name: Generate SHA256 Checksums
        run: |
          cd dist
          sha256sum ned-linux-gnu-${{ needs.version.outputs.version }} > ned-linux-gnu-${{ needs.version.outputs.version }}.sha256
          sha256sum ned-linux-musl-${{ needs.version.outputs.version }} > ned-linux-musl-${{ needs.version.outputs.version }}.sha256
          sha256sum ned-macos-${{ needs.version.outputs.version }} > ned-macos-${{ needs.version.outputs.version }}.sha256
          sha256sum ned-windows-${{ needs.version.outputs.version }}.exe > ned-windows-${{ needs.version.outputs.version }}.exe.sha256
          sha256sum ned-windows-gnu-${{ needs.version.outputs.version }}.exe > ned-windows-gnu-${{ needs.version.outputs.version }}.exe.sha256
          sha256sum ned-linux-gnu-${{ needs.version.outputs.version }} ned-linux-musl-${{ needs.version.outputs.version }} ned-macos-${{ needs.version.outputs.version }} ned-windows-${{ needs.version.outputs.version }}.exe ned-windows-gnu-${{ needs.version.outputs.version }}.exe > SHA256SUMS

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          files: |
            dist/ned-linux-gnu-${{ needs.version.outputs.version }}
            dist/ned-linux-musl-${{ needs.version.outputs.version }}
            dist/ned-macos-${{ needs.version.outputs.version }}
            dist/ned-windows-${{ needs.version.outputs.version }}.exe
            dist/ned-windows-gnu-${{ needs.version.outputs.version }}.exe
            dist/ned-linux-gnu-${{ needs.version.outputs.version }}.sha256
            dist/ned-linux-musl-${{ needs.version.outputs.version }}.sha256
            dist/ned-macos-${{ needs.version.outputs.version }}.sha256
            dist/ned-windows-${{ needs.version.outputs.version }}.exe.sha256
            dist/ned-windows-gnu-${{ needs.version.outputs.version }}.exe.sha256
            dist/SHA256SUMS
          generate_release_notes: true
          draft: true
